name: Build and Push Docker Image

on:
  # 自动构建：推送到 main/master 分支或创建 tag 时触发
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

  # 手动构建：支持通过 GitHub Actions UI 手动触发
  workflow_dispatch:
    inputs:
      tag:
        description: '自定义镜像标签（留空则使用 latest）'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 手动触发时使用自定义标签
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}
            # 手动触发且无自定义标签时使用 latest
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag == '' }}
            # 推送到默认分支时标记为 latest
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/heads/') }}
            # 根据 Git tag 生成版本标签 (v1.0.0 → 1.0.0)
            type=semver,pattern={{version}}
            # 根据 Git tag 生成主版本标签 (v1.0.0 → 1.0)
            type=semver,pattern={{major}}.{{minor}}
            # 使用 Git commit SHA 作为标签
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
