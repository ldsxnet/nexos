<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexos Accounts Manager</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --panel-bg: #1e293b;
            --border: #334155;
            --error: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            color: var(--text-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        button, .file-upload-label {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        button:hover, .file-upload-label:hover {
            background-color: var(--primary-hover);
        }

        .file-upload-label {
            background-color: var(--border);
        }

        .file-upload-label:hover {
            background-color: #475569;
        }

        input[type="file"] {
            display: none;
        }

        textarea {
            width: 100%;
            height: 400px;
            background-color: #0c1222;
            color: #10b981;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .status {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 6px;
            display: none;
            font-size: 0.875rem;
        }

        .status.success {
            display: block;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status.error {
            display: block;
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid var(--error);
        }

        .hint {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>Nexos Accounts Configuration</span>
        </h1>
        
        <p class="hint">Upload a JSON file or edit the content directly. Changes will be saved to disk and take effect immediately in memory.</p>
        
        <div class="actions">
            <button id="btn-save" onclick="saveAccounts()">💾 Save Changes</button>
            <label class="file-upload-label">
                <input type="file" id="file-upload" accept=".json" onchange="uploadFile(event)">
                📁 Upload JSON File
            </label>
            <button id="btn-reload" onclick="loadAccounts()" style="background-color: var(--border);">🔄 Reload from Server</button>
            <div style="flex:1"></div>
            <input type="password" id="admin-pwd" placeholder="Admin Password (if any)" style="padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-color); color: white;">
        </div>
        
        <div id="status-message" class="status"></div>

        <textarea id="json-editor" spellcheck="false" placeholder="Loading accounts..."></textarea>
    </div>

    <script>
        const editor = document.getElementById('json-editor');
        const statusBox = document.getElementById('status-message');

        function showStatus(message, isError = false) {
            statusBox.textContent = message;
            statusBox.className = 'status ' + (isError ? 'error' : 'success');
            setTimeout(() => {
                statusBox.style.display = 'none';
                statusBox.className = 'status';
            }, 5000);
        }

        function getAuthHeaders() {
            const pwd = document.getElementById('admin-pwd').value;
            const headers = { 'Content-Type': 'application/json' };
            if (pwd) {
                headers['Authorization'] = 'Bearer ' + pwd;
            }
            return headers;
        }

        async function loadAccounts() {
            try {
                editor.value = 'Loading...';
                const res = await fetch('/v1/accounts', {
                    headers: getAuthHeaders()
                });
                
                if (!res.ok) {
                    throw new Error(`Error: ${res.status} ${res.statusText}`);
                }
                
                const data = await res.json();
                editor.value = JSON.stringify(data, null, 4);
            } catch (err) {
                editor.value = '';
                showStatus('Failed to load accounts: ' + err.message, true);
            }
        }

        async function saveAccounts() {
            try {
                const text = editor.value;
                const json = JSON.parse(text); // Validate format

                const res = await fetch('/v1/accounts', {
                    method: 'PUT',
                    headers: getAuthHeaders(),
                    body: JSON.stringify(json)
                });
                
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.detail || `Error: ${res.status}`);
                }

                showStatus('Accounts saved successfully!');
            } catch (err) {
                if (err instanceof SyntaxError) {
                    showStatus('Invalid JSON format: ' + err.message, true);
                } else {
                    showStatus('Failed to save accounts: ' + err.message, true);
                }
            }
        }

        async function uploadFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const text = e.target.result;
                    const json = JSON.parse(text); // Validate
                    editor.value = JSON.stringify(json, null, 4);
                    await saveAccounts(); // Auto save
                    showStatus('File uploaded and saved successfully!');
                } catch (err) {
                    showStatus('Invalid JSON file: ' + err.message, true);
                }
                event.target.value = ''; // Reset file input
            };
            reader.readAsText(file);
        }

        // Initialize
        loadAccounts();
    </script>
</body>
</html>
